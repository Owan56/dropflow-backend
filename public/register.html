<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DropFlow — Create Account</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      color: #6366f1;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #cbd5e1;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: #6366f1;
    }

    input::placeholder {
      color: #475569;
    }

    button[type="submit"] {
      width: 100%;
      padding: 11px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }

    button[type="submit"]:hover { background: #4f46e5; }
    button[type="submit"]:disabled { background: #3730a3; cursor: not-allowed; }

    .message {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }

    .message.error   { background: #450a0a; border: 1px solid #7f1d1d; color: #fca5a5; }
    .message.success { background: #052e16; border: 1px solid #14532d; color: #86efac; }

    .login-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #94a3b8;
    }

    .login-link a { color: #6366f1; text-decoration: none; }
    .login-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">DropFlow</div>
    <h1>Create your account</h1>
    <p class="subtitle">Start your free trial — no credit card required.</p>

    <form id="register-form" novalidate>
      <div class="field">
        <label for="full_name">Full name</label>
        <input
          type="text"
          id="full_name"
          name="full_name"
          placeholder="John Doe"
          autocomplete="name"
          required
        />
      </div>

      <div class="field">
        <label for="email">Email address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="vous@exemple.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="new-password"
          minlength="8"
          required
        />
      </div>

      <button type="submit" id="submit-btn">Create account</button>
      <div class="message" id="message"></div>
    </form>

    <p class="login-link">Already have an account? <a href="/login.html">Sign in</a></p>
  </div>

  <script>
    const form = document.getElementById('register-form');
    const btn  = document.getElementById('submit-btn');
    const msg  = document.getElementById('message');

    function showMessage(text, type) {
      msg.textContent = text;
      msg.className = 'message ' + type;
      msg.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.style.display = 'none';

      const full_name = form.elements['full_name'].value.trim();
      const email     = form.elements['email'].value.trim();
      const password  = form.elements['password'].value;

      if (!full_name || !email || !password) {
        showMessage('Please fill in all fields.', 'error');
        return;
      }

      if (password.length < 8) {
        showMessage('Password must be at least 8 characters.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        const res = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ full_name, email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          showMessage(data.error || 'Registration failed. Please try again.', 'error');
          return;
        }

        // Store the JWT token
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        showMessage('Account created! Redirecting…', 'success');
        setTimeout(() => { window.location.href = '/'; }, 1200);
      } catch (err) {
        showMessage('Network error. Please check your connection and try again.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
